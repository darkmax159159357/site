server {
    server_name medusascans.org;
    
    client_max_body_size 500M;
    
    # Add direct access to public directory
    location /public/ {
        alias /home/medusascans/public/;
        autoindex on;
        try_files  / =404;
        access_log /var/log/nginx/medusa-public-access.log;
        error_log /var/log/nginx/medusa-public-error.log;
    }
    
    # Modified location block for Medusa manga files
    location /Medusa/ {
        root /home/medusascans/public;
        autoindex on;
        try_files  / =404;
        access_log /var/log/nginx/medusa-access.log;
        error_log /var/log/nginx/medusa-error.log;
    }
    
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade ;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host ;
        proxy_cache_bypass ;
        proxy_set_header X-Forwarded-For ;
        proxy_set_header X-Real-IP ;
        proxy_set_header X-Forwarded-Proto ;
    }

    listen 443 ssl;
    # SSL certificates will need to be updated or regenerated for the new domain
    ssl_certificate /etc/letsencrypt/live/medusascans.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medusascans.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP redirect server block - properly redirects all HTTP to HTTPS
server {
    listen 80;
    server_name medusascans.org www.medusascans.org;
    
    # Permanent redirect to HTTPS
    return 301 https://medusascans.org$request_uri;
}
