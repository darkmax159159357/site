<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff7f57" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff5757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a7d5a"/>
      <stop offset="1" stop-color="#1f4d38"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6db58a"/>
      <stop offset="1" stop-color="#2c6b4a"/>
    </linearGradient>
  </defs>
  <ellipse cx="200" cy="250" rx="180" ry="220" fill="url(#glow)"/>
  <!-- snake hair -->
  <g stroke="url(#snake)" stroke-width="11" fill="none" stroke-linecap="round">
    <path d="M170 120 q-45 -30 -30 -75 q10 -25 35 -10"/>
    <path d="M200 110 q0 -45 30 -60 q25 -10 25 18"/>
    <path d="M230 120 q45 -25 40 -70 q-3 -28 -32 -14"/>
    <path d="M155 140 q-55 -8 -60 -50"/>
    <path d="M245 140 q55 -8 62 -48"/>
  </g>
  <!-- head -->
  <circle cx="200" cy="160" r="42" fill="#e7c9a0"/>
  <!-- eyes -->
  <circle cx="185" cy="158" r="4" fill="#1f4d38"/>
  <circle cx="215" cy="158" r="4" fill="#1f4d38"/>
  <!-- body / gown -->
  <path d="M158 200 q42 28 84 0 q35 90 18 230 q-60 25 -120 0 q-17 -140 18 -230 Z" fill="url(#body)"/>
  <!-- gold accents -->
  <rect x="170" y="300" width="60" height="8" rx="4" fill="#d4af37"/>
  <rect x="178" y="210" width="44" height="6" rx="3" fill="#d4af37"/>
</svg>
