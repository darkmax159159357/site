<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500" fill="none">
  <defs>
    <radialGradient id="gsGlow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#ff7f57" stop-opacity="0.40"/>
      <stop offset="55%" stop-color="#ff7f57" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff5757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gsBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE3BE"/>
      <stop offset="0.45" stop-color="#FFA968"/>
      <stop offset="1" stop-color="#FF7F57"/>
    </linearGradient>
    <radialGradient id="gsCore" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#FFE9C7"/>
      <stop offset="1" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gsSpark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE2A8"/>
    </linearGradient>
    <filter id="gsSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="200" cy="250" rx="175" ry="215" fill="url(#gsGlow)"/>

  <!-- floating glint above the head (ties to the logo) -->
  <g>
    <path d="M200 70
             C 207 104, 226 123, 260 130
             C 226 137, 207 156, 200 190
             C 193 156, 174 137, 140 130
             C 174 123, 193 104, 200 70 Z"
          fill="url(#gsSpark)"/>
    <circle cx="200" cy="130" r="9" fill="#FFF6E2"/>
  </g>

  <!-- little stub arms -->
  <path d="M112 300 q-34 6 -30 40 q22 6 34 -16 Z" fill="#FF8C5A"/>
  <path d="M288 300 q34 6 30 40 q-22 6 -34 -16 Z" fill="#FF8C5A"/>

  <!-- body (rounded glow spirit with wavy tail) -->
  <path d="M112 372
           C 108 274, 112 206, 150 174
           C 172 156, 228 156, 250 174
           C 288 206, 292 274, 288 372
           Q 266 402 244 372
           Q 222 402 200 372
           Q 178 402 156 372
           Q 134 402 112 372 Z"
        fill="url(#gsBody)"/>

  <!-- glossy highlight -->
  <ellipse cx="166" cy="222" rx="42" ry="56" fill="#FFFFFF" opacity="0.18"/>

  <!-- glowing chest core -->
  <circle cx="200" cy="288" r="46" fill="url(#gsCore)"/>
  <circle cx="200" cy="288" r="17" fill="#FFFFFF" opacity="0.9"/>

  <!-- cheeks -->
  <ellipse cx="158" cy="262" rx="12" ry="8" fill="#FF5C7A" opacity="0.30"/>
  <ellipse cx="242" cy="262" rx="12" ry="8" fill="#FF5C7A" opacity="0.30"/>

  <!-- eyes -->
  <circle cx="174" cy="244" r="9" fill="#5A2A1A"/>
  <circle cx="226" cy="244" r="9" fill="#5A2A1A"/>
  <circle cx="177" cy="241" r="3" fill="#FFFFFF"/>
  <circle cx="229" cy="241" r="3" fill="#FFFFFF"/>

  <!-- smile -->
  <path d="M186 266 Q 200 278 214 266" stroke="#5A2A1A" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- drifting mini sparkles -->
  <path d="M312 196 q4 12 16 16 q-12 4 -16 16 q-4 -12 -16 -16 q12 -4 16 -16 Z" fill="#FFD79A" opacity="0.9"/>
  <path d="M96 188 q3 9 12 12 q-9 3 -12 12 q-3 -9 -12 -12 q9 -3 12 -12 Z" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="300" cy="330" r="4" fill="#FFD79A" opacity="0.8"/>
  <circle cx="108" cy="346" r="3.5" fill="#FFFFFF" opacity="0.7"/>
</svg>
