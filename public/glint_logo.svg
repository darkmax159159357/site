<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glintBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9F57"/>
      <stop offset="0.55" stop-color="#FF7F57"/>
      <stop offset="1" stop-color="#F2603A"/>
    </linearGradient>
    <linearGradient id="glintSpark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE9C7"/>
    </linearGradient>
    <radialGradient id="glintCore" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.4" stop-color="#FFE9C7"/>
      <stop offset="1" stop-color="#FFC979"/>
    </radialGradient>
    <filter id="glintGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded "squircle" badge -->
  <rect x="36" y="36" width="440" height="440" rx="116" fill="url(#glintBadge)"/>
  <!-- top gloss highlight -->
  <rect x="36" y="36" width="440" height="220" rx="116" fill="#FFFFFF" opacity="0.10"/>
  <!-- inner ring -->
  <rect x="58" y="58" width="396" height="396" rx="100" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Main glint sparkle (4-point) -->
  <g filter="url(#glintGlow)">
    <path d="M256 96
             C 270 196, 316 242, 416 256
             C 316 270, 270 316, 256 416
             C 242 316, 196 270, 96 256
             C 196 242, 242 196, 256 96 Z"
          fill="url(#glintSpark)"/>
    <!-- bright core -->
    <circle cx="256" cy="256" r="34" fill="url(#glintCore)"/>
  </g>

  <!-- secondary accent sparkle (top-right) -->
  <path d="M372 150
           C 377 174, 390 187, 414 192
           C 390 197, 377 210, 372 234
           C 367 210, 354 197, 330 192
           C 354 187, 367 174, 372 150 Z"
        fill="#FFF4DE" opacity="0.95"/>
  <!-- tiny sparkle (bottom-left) -->
  <path d="M150 356
           C 153 370, 161 378, 175 381
           C 161 384, 153 392, 150 406
           C 147 392, 139 384, 125 381
           C 139 378, 147 370, 150 356 Z"
        fill="#FFFFFF" opacity="0.85"/>
</svg>
